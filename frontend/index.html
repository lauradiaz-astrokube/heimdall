<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HeimdALL</title>
    <script>
      // Restaura la ruta original redirigida desde 404.html (GitHub Pages SPA fix)
      (function() {
        var redirect = window.location.search.slice(1);
        if (redirect.startsWith('p=/')) {
          var parts = redirect.split('&q=');
          var path = parts[0].slice(2).replace(/~and~/g, '&');
          var query = parts[1] ? '?' + parts[1].replace(/~and~/g, '&') : '';
          window.history.replaceState(null, null, '/heimdall' + path + query + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
